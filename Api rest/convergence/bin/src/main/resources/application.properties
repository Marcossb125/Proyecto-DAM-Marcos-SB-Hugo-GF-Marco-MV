spring.application.name=convergence
# MySQL datasource for the 'convergence' database running on localhost:3306
# Use environment variables DB_USER and DB_PASS to avoid hardcoding credentials.
spring.datasource.url=jdbc:mysql://localhost:3306/convergence?serverTimezone=UTC&useSSL=false
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari pool (reasonable defaults for a small app)
spring.datasource.hikari.maximum-pool-size=5

# Optional: show SQL in logs during development
spring.jpa.show-sql=false

