<div class="register-wrapper">

  <!-- ═══ TACTICAL GRID BACKGROUND ═══ -->
  <div class="tactical-grid"></div>
  <div class="scanline"></div>

  <!-- ═══ SONAR CONTACTS ═══ -->
  <div class="sonar-contact contact-1"></div>
  <div class="sonar-contact contact-2"></div>
  <div class="sonar-contact contact-3"></div>

  <!-- ═══ BANNER HEADER ═══ -->
  <section class="banner-section">
    <div class="banner-overlay"></div>
    <div class="banner-grid"></div>
    <div class="banner-content">
      <div class="brand-emblem">
        <div class="emblem-ring"></div>
        <div class="emblem-core"></div>
      </div>
      <h1 class="banner-title">CONVERGENCE</h1>
      <div class="banner-divider"></div>
      <span class="banner-subtitle">REGISTRO DE NUEVOS RECLUTAS</span>
    </div>
  </section>

  <!-- ═══ REGISTER PANEL ═══ -->
  <section class="panel-section">
    <div class="panel">
      <div class="corner-ornament top-left"></div>
      <div class="corner-ornament top-right"></div>
      <div class="corner-ornament bottom-left"></div>
      <div class="corner-ornament bottom-right"></div>

      <!-- Panel Header -->
      <div class="panel-header">
        <div class="section-title-line"></div>
        <h2 class="section-title">CREAR CUENTA</h2>
        <div class="section-title-line"></div>
      </div>

      <p class="panel-subtitle">Únete al campo de batalla de Convergence</p>

      <!-- Form -->
      <form class="register-form" (ngSubmit)="onRegister()">
        <!-- Email -->
        <div class="input-group">
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <path d="M22 4L12 13 2 4" />
            </svg>
          </div>
          <input type="email" id="register-email" placeholder="Email" [ngModel]="email()"
            (ngModelChange)="email.set($event)" name="email" autocomplete="email" />
        </div>

        <!-- Username -->
        <div class="input-group">
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </div>
          <input type="text" id="register-username" placeholder="Nombre de usuario" [ngModel]="username()"
            (ngModelChange)="username.set($event)" name="username" autocomplete="username" />
        </div>

        <!-- Password -->
        <div class="input-group">
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
          </div>
          <input type="password" id="register-password" placeholder="Contraseña" [ngModel]="password()"
            (ngModelChange)="password.set($event)" name="password" autocomplete="new-password" />
        </div>

        <!-- Confirm Password -->
        <div class="input-group">
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
          </div>
          <input type="password" id="register-confirm-password" placeholder="Confirmar Contraseña"
            [ngModel]="confirmPassword()" (ngModelChange)="confirmPassword.set($event)" name="confirmPassword"
            autocomplete="new-password" />
        </div>

        <!-- Error message -->
        @if (errorMessage()) {
        <div class="error-message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <circle cx="12" cy="12" r="10" />
            <line x1="15" y1="9" x2="9" y2="15" />
            <line x1="9" y1="9" x2="15" y2="15" />
          </svg>
          {{ errorMessage() }}
        </div>
        }

        <!-- Register Button -->
        <button type="submit" id="register-submit" class="btn-primary" [class.loading]="isLoading()"
          [disabled]="isLoading()">
          @if (isLoading()) {
          <span class="spinner"></span>
          <span>REGISTRANDO...</span>
          } @else {
          <span>🛡 REGISTRARSE</span>
          }
        </button>
      </form>

      <!-- Footer link -->
      <div class="panel-footer">
        <span class="footer-text">¿Ya eres un guerrero?</span>
        <a routerLink="/login" class="footer-link" id="register-go-login">Iniciar Sesión</a>
      </div>
    </div>
  </section>

</div>
