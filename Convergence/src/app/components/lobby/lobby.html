<div class="lobby-wrapper">

  <!-- ═══ TACTICAL GRID BACKGROUND ═══ -->
  <div class="tactical-grid"></div>
  <div class="scanline"></div>

  <!-- ═══ SONAR CONTACTS ═══ -->
  <div class="sonar-contact contact-1"></div>
  <div class="sonar-contact contact-2"></div>
  <div class="sonar-contact contact-3"></div>

  <!-- ═══ BANNER ═══ -->
  <section class="banner-section">
    <div class="banner-overlay"></div>
    <div class="banner-grid"></div>
    <div class="banner-content">
      <div class="brand-emblem">
        <div class="emblem-ring"></div>
        <div class="emblem-core"></div>
      </div>
      <h1 class="banner-title">CONVERGENCe</h1>
      <div class="banner-divider"></div>
      <span class="banner-subtitle">SALA DE OPERACIONES</span>
    </div>
  </section>



  <!-- ═══ SEARCH BAR ═══ -->
  <section class="search-section">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <input type="text" placeholder="Filtrar por nombre, host o modo..." id="lobby-search" />
    </div>
  </section>

  <!-- ═══ PARTIDAS DISPONIBLES ═══ -->
  <section class="games-section">
    <div class="section-header">
      <div class="section-title-line"></div>
      <h2 class="section-title">PARTIDAS DISPONIBLES — {{ games().length }} ACTIVAS</h2>
      <div class="section-title-line"></div>
    </div>

    <!-- Table Header (Desktop) -->
    <div class="table-header">
      <span class="col-name">SECTOR / HOST</span>
      <span class="col-players">UNIDADES</span>
      <span class="col-ping">SEÑAL</span>
      <span class="col-action">ESTADO</span>
    </div>

    <!-- Game List -->
    <div class="game-list">
      @for (game of games(); track game.id) {
      <div class="game-slot" [class.game-full]="game.status === 'full'">
        <div class="col-name">
          <div class="game-name-group">
            <span class="game-name">{{ game.name }}</span>
            <span class="game-host">Comandado por {{ game.host }}</span>
          </div>
        </div>

        <div class="col-players">
          <div class="players-info">
            <span class="players-count" [class.players-full]="game.status === 'full'">
              {{ getPlayerRatio(game) }}
            </span>
            <div class="players-bar">
              <div class="players-bar-fill" [class.bar-full]="game.status === 'full'"
                [style.width]="getPlayerBarWidth(game)"></div>
            </div>
          </div>
        </div>

        <div class="col-ping">
          <span class="ping-indicator" [class]="getPingClass(game.ping)">
            <span class="ping-dot"></span>
            {{ game.ping }}ms
          </span>
        </div>

        <div class="col-action">
          @if (game.status === 'open') {
          <button class="btn-join" (click)="joinGame(game)" [id]="'join-game-' + game.id">
            ▶ DEPLOY
          </button>
          } @else {
          <button class="btn-full" disabled>
            ✕ LLENA
          </button>
          }
        </div>
      </div>
      }
    </div>
  </section>

  <!-- ═══ BOTONES PRINCIPALES ═══ -->
  <section class="main-actions-section">
    <button class="btn-main btn-new-game" (click)="createGame()" id="lobby-create-game">
      + CREAR NUEVA PARTIDA
    </button>
  </section>

  <!-- ═══ NAVBAR INFERIOR ═══ -->
  <nav class="bottom-navbar">
    <button class="navbar-btn" (click)="navigateTo('/inicio')" id="lobby-bottomnav-inicio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        <polyline points="9 22 9 12 15 12 15 22" />
      </svg>
      <span>Inicio</span>
    </button>
    <button class="navbar-btn active" id="lobby-bottomnav-partidas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10" />
        <polygon points="10 8 16 12 10 16 10 8" />
      </svg>
      <span>Partidas</span>
    </button>
    <button class="navbar-btn" id="lobby-bottomnav-categoria">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6" x2="21" y2="6" />
        <line x1="8" y1="12" x2="21" y2="12" />
        <line x1="8" y1="18" x2="21" y2="18" />
        <line x1="3" y1="6" x2="3.01" y2="6" />
        <line x1="3" y1="12" x2="3.01" y2="12" />
        <line x1="3" y1="18" x2="3.01" y2="18" />
      </svg>
      <span>Categoría</span>
    </button>
    <button class="navbar-btn" id="lobby-bottomnav-mensajes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
      </svg>
      <span>Mensajes</span>
    </button>
  </nav>

</div>
