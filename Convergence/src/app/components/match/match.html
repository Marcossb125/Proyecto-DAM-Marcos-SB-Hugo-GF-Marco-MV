<!-- ═══════════════════════════════════════════════════════════════
     MATCH COMPONENT — Main Game Layout
     ═══════════════════════════════════════════════════════════════ -->

<div class="match-container" id="match-root">
  <!-- Tactical grid background (decorative) -->
  <div class="tactical-grid"></div>

  <!-- PixiJS Map (full viewport) -->
  <div class="map-layer">
    <app-map></app-map>
  </div>

  <!-- HUD Overlay (on top of map) -->
  <div class="hud-layer">
    <app-hud></app-hud>
  </div>

  <!-- Back button -->
  <button class="btn-back" (click)="goBack()" title="Volver al inicio" id="match-back-btn">
    SALIR
  </button>
</div>
