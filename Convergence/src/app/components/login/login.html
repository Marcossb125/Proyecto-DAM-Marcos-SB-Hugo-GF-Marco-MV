<div class="login-wrapper">

  <!-- ═══ TACTICAL GRID BACKGROUND ═══ -->
  <div class="tactical-grid"></div>
  <div class="scanline"></div>

  <!-- ═══ BANNER HEADER ═══ -->
  <section class="banner-section">
    <div class="banner-overlay"></div>
    <div class="banner-grid"></div>
    <div class="banner-content">
      <div class="brand-emblem">
        <div class="emblem-ring"></div>
        <div class="emblem-core"></div>
      </div>
      <h1 class="banner-title">CONVERGENCe</h1>
      <div class="banner-divider"></div>
      <span class="banner-subtitle">TACTICAL COMMAND CENTER</span>
    </div>
  </section>

  <!-- ═══ LOGIN PANEL ═══ -->
  <section class="panel-section">
    <div class="panel">
      <div class="corner-ornament top-left"></div>
      <div class="corner-ornament top-right"></div>
      <div class="corner-ornament bottom-left"></div>
      <div class="corner-ornament bottom-right"></div>

      <!-- Panel Header -->
      <div class="panel-header">
        <div class="section-title-line"></div>
        <h2 class="section-title">ACCESO OPERATIVO</h2>
        <div class="section-title-line"></div>
      </div>

      <!-- Form -->
      <form class="login-form" (ngSubmit)="onLogin()">
        <!-- Username -->
        <div class="input-group">
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <input
            type="text"
            id="login-username"
            placeholder="Nombre de usuario"
            [ngModel]="username()"
            (ngModelChange)="username.set($event)"
            name="username"
            autocomplete="username"
          />
        </div>

        <!-- Password -->
        <div class="input-group">
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <input
            type="password"
            id="login-password"
            placeholder="Contraseña"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            name="password"
            autocomplete="current-password"
          />
        </div>

        <!-- Error message -->
        @if (errorMessage()) {
          <div class="error-message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <circle cx="12" cy="12" r="10"/>
              <line x1="15" y1="9" x2="9" y2="15"/>
              <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            {{ errorMessage() }}
          </div>
        }

        <!-- Login Button -->
        <button
          type="submit"
          id="login-submit"
          class="btn-primary"
          [class.loading]="isLoading()"
          [disabled]="isLoading()"
        >
          @if (isLoading()) {
            <span class="spinner"></span>
            <span>AUTENTICANDO...</span>
          } @else {
            <span>⚔ INICIAR SESIÓN</span>
          }
        </button>
      </form>

      <!-- Footer link -->
      <div class="panel-footer">
        <span class="footer-text">¿Nuevo recluta?</span>
        <a routerLink="/register" class="footer-link" id="login-go-register">Crear Cuenta</a>
      </div>
    </div>
  </section>

</div>
