<div class="login-wrapper">
  <div class="panel">
    <!-- Decorative corner ornaments -->
    <div class="corner-ornament top-left"></div>
    <div class="corner-ornament top-right"></div>
    <div class="corner-ornament bottom-left"></div>
    <div class="corner-ornament bottom-right"></div>

    <!-- Logo / Shield -->
    <div class="logo-section">
      <div class="shield-icon">
        <svg viewBox="0 0 80 96" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M40 0L80 16V48C80 72 60 88 40 96C20 88 0 72 0 48V16L40 0Z" fill="#1a1a2e" stroke="#c9a84c" stroke-width="3"/>
          <path d="M40 8L72 20V48C72 68 56 80 40 88C24 80 8 68 8 48V20L40 8Z" fill="#0f1629" stroke="#8b7332" stroke-width="1"/>
          <!-- Wings -->
          <path d="M20 30C10 24 4 28 2 32C8 30 14 32 20 38V30Z" fill="#c9a84c" opacity="0.8"/>
          <path d="M60 30C70 24 76 28 78 32C72 30 66 32 60 38V30Z" fill="#c9a84c" opacity="0.8"/>
          <!-- Sword -->
          <path d="M40 20V70M36 24H44M34 66L40 72L46 66" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="title">CONVERGENCE</h1>
      <div class="title-divider"></div>
    </div>

    <!-- Form -->
    <form class="login-form" (ngSubmit)="onLogin()">
      <!-- Username -->
      <div class="input-group">
        <div class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <input
          type="text"
          id="login-username"
          placeholder="Username"
          [ngModel]="username()"
          (ngModelChange)="username.set($event)"
          name="username"
          autocomplete="username"
        />
      </div>

      <!-- Password -->
      <div class="input-group">
        <div class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <input
          type="password"
          id="login-password"
          placeholder="Password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          autocomplete="current-password"
        />
      </div>

      <!-- Error message -->
      @if (errorMessage()) {
        <div class="error-message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          {{ errorMessage() }}
        </div>
      }

      <!-- Login Button -->
      <button
        type="submit"
        id="login-submit"
        class="btn-primary"
        [class.loading]="isLoading()"
        [disabled]="isLoading()"
      >
        @if (isLoading()) {
          <span class="spinner"></span>
          <span>ENTERING...</span>
        } @else {
          <span>LOGIN</span>
        }
      </button>
    </form>

    <!-- Footer link -->
    <div class="panel-footer">
      <span class="footer-text">No account yet?</span>
      <a routerLink="/register" class="footer-link">Create Account</a>
    </div>
  </div>
</div>
