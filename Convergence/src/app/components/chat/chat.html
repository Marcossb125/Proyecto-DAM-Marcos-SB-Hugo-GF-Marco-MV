<div class="top-right-actions">
  <button mat-icon-button class="nav-button">
    <mat-icon>notifications</mat-icon>
  </button>

  <button mat-icon-button class="nav-button" (click)="logout()">
    <mat-icon>logout</mat-icon>
  </button>
</div>

<div class="chat-wrapper">
  <!-- ═══ TACTICAL GRID BACKGROUND ═══ -->
  <div class="tactical-grid"></div>
  <div class="scanline"></div>

  <!-- ═══ HEADER ═══ -->
  <header class="chat-header">
    <div class="header-content">
      <h1 class="chat-title">CHAT GLOBAL</h1>
      <span class="chat-status">
        <span class="status-dot"></span>
        CANAL SEGURO ACTIVO
      </span>
    </div>
    <div class="header-divider"></div>
  </header>

  <!-- ═══ MESSAGES AREA ═══ -->
  <main class="messages-container" #scrollContainer>
    <div class="message-history">
      @for (message of messages(); track message.id) {
        <div class="message-wrapper" [class.self]="message.isSelf">
          <div class="message-meta">
            <span class="sender-name">{{ message.sender }}</span>
            <span class="message-time">{{ message.timestamp | date:'HH:mm' }}</span>
          </div>
          <div class="message-bubble">
            <p class="message-text">{{ message.content }}</p>
          </div>
        </div>
      }
    </div>
  </main>

  <!-- ═══ INPUT AREA ═══ -->
  <footer class="chat-footer">
    <div class="input-container">
      <input 
        type="text" 
        [(ngModel)]="newMessage" 
        (keyup.enter)="sendMessage()"
        placeholder="Escribe un mensaje..." 
        class="chat-input"
      >
      <button class="btn-send" (click)="sendMessage()">
        <mat-icon>send</mat-icon>
      </button>
    </div>
  </footer>

  <!-- ═══ NAVBAR INFERIOR ═══ -->
  <nav class="bottom-navbar">
    <button class="navbar-btn" (click)="navigateTo('/inicio')" id="chat-nav-inicio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        <polyline points="9 22 9 12 15 12 15 22" />
      </svg>
      <span>Inicio</span>
    </button>
    <button class="navbar-btn" (click)="navigateTo('/lobby')" id="chat-nav-partidas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10" />
        <polygon points="10 8 16 12 10 16 10 8" />
      </svg>
      <span>Partidas</span>
    </button>
    <button class="navbar-btn" (click)="navigateTo('/personajes')" id="chat-nav-personajes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>
      <span>Personajes</span>
    </button>
    <button class="navbar-btn" (click)="navigateTo('/ranking')" id="chat-nav-ranking">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6" x2="21" y2="6" />
        <line x1="8" y1="12" x2="21" y2="12" />
        <line x1="8" y1="18" x2="21" y2="18" />
        <line x1="3" y1="6" x2="3.01" y2="6" />
        <line x1="3" y1="12" x2="3.01" y2="12" />
        <line x1="3" y1="18" x2="3.01" y2="18" />
      </svg>
      <span>Ranking</span>
    </button>
    <button class="navbar-btn active" id="chat-nav-chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
      </svg>
      <span>Chat</span>
    </button>
  </nav>
</div>
